version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/compensa_db?sslmode=disable
      - AUTH_SECRET=h2g2-42-secret-antigravity-auth-key-random
      - GROQ_API_KEY=mock-api-key
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=compensa_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
